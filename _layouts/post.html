---
layout: default
---
<h1 class="sparkle-less">{{ page.title }}</h1>

{% if page.hero %}
<div class="post-hero">
    {% include img.html src=page.hero alt=page.title class="post-hero-img" max_width=800 loading="eager" fetchpriority="high" %}
</div>
{% endif %}

<hr class="post-hr">
<p class="timestamp">{{ page.date | date_to_string }}</p>

{{ content }}

{% if page.redditurl %}
<h2 id="comments">Comments</h2>
<script src="{{ page.redditurl }}.embed"></script>
{% endif %}
